{% extends 'base_auth.html' %}
{% block title %}Senha redefinida — ThunderMail{% endblock %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 w-full max-w-md text-center">

        <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-green-500 text-2xl">check_circle</span>
        </div>

        <h1 class="text-xl font-semibold text-gray-900 mb-2">Senha redefinida!</h1>
        <p class="text-sm text-gray-500 leading-relaxed">
            Sua senha foi alterada com sucesso. Agora você pode entrar com a nova senha.
        </p>

        <a href="{% url 'accounts:login' %}"
            class="inline-block mt-8 bg-gray-900 text-white px-8 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition">
            Entrar na conta
        </a>

    </div>
</div>

{% endblock %}
