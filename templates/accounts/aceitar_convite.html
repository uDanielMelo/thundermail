{% extends 'base_auth.html' %}

{% block title %}Aceitar Convite — ThunderMail{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <div class="text-center mb-6">
        <span class="material-symbols-outlined text-4xl text-gray-900">mail</span>
        <h2 class="text-xl font-bold text-gray-900 mt-2">Voce foi convidado!</h2>
        <p class="text-sm text-gray-500 mt-1">
            Para fazer parte de <strong>{{ invite.organization.nome }}</strong>
        </p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
            <input type="email" value="{{ invite.email }}" disabled
                class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm bg-gray-50 text-gray-500">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Seu nome</label>
            <input type="text" name="nome" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                placeholder="Seu nome completo">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
            <input type="password" name="password" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                placeholder="••••••••">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Senha</label>
            <input type="password" name="password2" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                placeholder="••••••••">
        </div>

        <button type="submit"
            class="w-full bg-gray-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition">
            Aceitar Convite e Entrar
        </button>
    </form>
</div>
{% endblock %}
