{% extends 'base_auth.html' %}

{% block title %}Cadastro — ThunderMail{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-xl font-bold text-gray-900 mb-6 text-center">Criar conta</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Nome de usuario</label>
            <input type="text" name="username" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                placeholder="seunome">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
            <input type="email" name="email" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                placeholder="seu@email.com">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">CPF</label>
            <input type="text" name="cpf" id="cpf" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                placeholder="000.000.000-00">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
            <input type="password" name="password" id="password" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                placeholder="••••••••">
            <div id="strength-box" class="mt-1 text-xs text-gray-400 hidden">
                Forca da senha: <span id="strength-label">---</span>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Senha</label>
            <input type="password" name="password2" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                placeholder="••••••••">
        </div>

        <button type="submit"
            class="w-full bg-gray-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition">
            Criar conta
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Ja tem conta?
        <a href="{% url 'accounts:login' %}" class="text-gray-900 font-medium hover:underline">Entrar</a>
    </p>
</div>

<script>
// Mascara CPF
document.getElementById("cpf").addEventListener("input", function () {
    let v = this.value.replace(/\D/g, "").slice(0, 11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
    this.value = v;
});

// Forca da senha
document.getElementById("password").addEventListener("input", function () {
    const box = document.getElementById("strength-box");
    const label = document.getElementById("strength-label");
    const value = this.value;
    box.classList.remove("hidden");

    let score = 0;
    if (value.length >= 6) score++;
    if (/[A-Z]/.test(value)) score++;
    if (/[0-9]/.test(value)) score++;
    if (/[^A-Za-z0-9]/.test(value)) score++;

    if (score <= 1) { label.textContent = "Fraca"; label.className = "text-red-500 font-medium"; }
    else if (score === 2) { label.textContent = "Media"; label.className = "text-yellow-500 font-medium"; }
    else { label.textContent = "Forte"; label.className = "text-green-500 font-medium"; }
});
</script>
{% endblock %}
