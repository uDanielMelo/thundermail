{% extends 'base_auth.html' %}
{% block title %}Esqueci minha senha — ThunderMail{% endblock %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 w-full max-w-md">

        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="material-symbols-outlined text-gray-500 text-2xl">lock_reset</span>
            </div>
            <h1 class="text-xl font-semibold text-gray-900">Esqueceu sua senha?</h1>
            <p class="text-sm text-gray-500 mt-2">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" name="email" required autofocus
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                    placeholder="seu@email.com">
            </div>
            <button type="submit"
                class="w-full bg-gray-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition">
                Enviar link de redefinição
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Lembrou a senha?
            <a href="{% url 'accounts:login' %}" class="text-gray-900 hover:underline font-medium">Entrar</a>
        </p>

    </div>
</div>

{% endblock %}
