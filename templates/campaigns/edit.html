{% extends 'base.html' %}

{% block title %}Editar Campanha — ThunderMail{% endblock %}

{% block content %}

<header class="mb-8 flex justify-between items-center">
    <div>
        <h2 class="text-2xl font-bold text-gray-900">Editar Rascunho</h2>
        <p class="text-sm text-gray-500 mt-1">{{ campaign.name }}</p>
    </div>
    <a href="{% url 'campaigns:list' %}"
        class="text-sm text-gray-500 hover:underline flex items-center gap-1">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        Voltar
    </a>
</header>

<form method="POST" id="campaignForm">
    {% csrf_token %}
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- COLUNA ESQUERDA -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Detalhes da Campanha</h3>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome da Campanha</label>
                    <input type="text" name="name" required value="{{ campaign.name }}"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Assunto do E-mail</label>
                    <input type="text" name="subject" required value="{{ campaign.subject }}"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                </div>
            </div>

            <!-- EDITOR UNLAYER -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Corpo do E-mail</h3>
                <div id="editor" style="height: 600px; border: 1px solid #e5e7eb; border-radius: 8px;"></div>
                <textarea name="body" id="body" hidden required></textarea>
            </div>
        </div>

        <!-- COLUNA DIREITA -->
        <div class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Destinatarios</h3>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Grupo de Contatos</label>
                    <select name="group"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                        <option value="">Selecione um grupo</option>
                        {% for group in groups %}
                        <option value="{{ group.pk }}" {% if campaign.group.pk == group.pk %}selected{% endif %}>
                            {{ group.name }} ({{ group.total_contacts }} contatos)
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        E-mail para respostas <span class="text-gray-400 text-xs">(reply-to)</span>
                    </label>
                    <input type="email" name="reply_to" value="{{ campaign.reply_to|default:'' }}"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                        placeholder="contato@suaempresa.com">
                </div>

                <div class="space-y-3">
                    <button type="button" id="saveDraftBtn"
                        class="w-full border border-gray-300 text-gray-700 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition">
                        Salvar Rascunho
                    </button>
                    <button type="button" id="sendNowBtn"
                        class="w-full bg-gray-900 text-white py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition">
                        Enviar Agora
                    </button>
                </div>
            </div>
        </div>

    </div>
</form>

<script src="https://editor.unlayer.com/embed.js"></script>
<script>
unlayer.init({
    id: 'editor',
    displayMode: 'email',
    locale: 'pt-BR',
    appearance: {
        theme: 'light',
    }
});

// Carrega o conteúdo existente
unlayer.loadDesign({
    body: {
        rows: [{
            cells: [1],
            columns: [{
                contents: [{
                    type: 'text',
                    values: {
                        containerPadding: '20px',
                        text: `{{ campaign.body|escapejs }}`
                    }
                }]
            }]
        }]
    }
});

function submitForm(action) {
    unlayer.exportHtml(function(data) {
        document.getElementById('body').value = data.html;
        const form = document.getElementById('campaignForm');
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'action';
        input.value = action;
        form.appendChild(input);
        form.submit();
    });
}

document.getElementById('saveDraftBtn').addEventListener('click', () => submitForm('draft'));
document.getElementById('sendNowBtn').addEventListener('click', () => submitForm('send'));
</script>

{% endblock %}
