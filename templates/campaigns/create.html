{% extends 'base.html' %}

{% block title %}Nova Campanha — ThunderMail{% endblock %}

{% block content %}

<header class="mb-8">
    <h2 class="text-2xl font-bold text-gray-900">Nova Campanha</h2>
    <p class="text-sm text-gray-500 mt-1">Configure e envie mensagens em massa</p>
</header>

<form method="POST" id="campaignForm">
    {% csrf_token %}
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- COLUNA ESQUERDA -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Detalhes da Campanha</h3>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome da Campanha</label>
                    <input type="text" name="name" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                        placeholder="Ex: Promocao de Natal">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Assunto do E-mail</label>
                    <input type="text" name="subject" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                        placeholder="Ex: Ofertas especiais para voce!">
                </div>
            </div>

            <!-- EDITOR UNLAYER -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Corpo do E-mail</h3>
                <div id="editor" style="height: 600px; border: 1px solid #e5e7eb; border-radius: 8px;"></div>
                <textarea name="body" id="body" hidden required></textarea>
            </div>
        </div>

        <!-- COLUNA DIREITA -->
        <div class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Destinatarios</h3>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Grupo de Contatos</label>
                    <select name="group"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                        <option value="">Selecione um grupo</option>
                        {% for group in groups %}
                        <option value="{{ group.pk }}">{{ group.name }} ({{ group.total_contacts }} contatos)</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="space-y-3">
                    <button type="button" id="saveDraftBtn"
                        class="w-full border border-gray-300 text-gray-700 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition">
                        Salvar Rascunho
                    </button>
                    <button type="button" id="sendNowBtn"
                        class="w-full bg-gray-900 text-white py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition">
                        Enviar Agora
                    </button>
                </div>
            </div>

            <!-- Templates prontos -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Templates Prontos</h3>
                <div class="space-y-2">
                    <button type="button" onclick="loadTemplate('promocao')"
                        class="w-full text-left px-4 py-3 border border-gray-200 rounded-lg text-sm hover:bg-gray-50 transition flex items-center gap-3">
                        <span class="material-symbols-outlined text-orange-500">local_offer</span>
                        Promocao
                    </button>
                    <button type="button" onclick="loadTemplate('boas_vindas')"
                        class="w-full text-left px-4 py-3 border border-gray-200 rounded-lg text-sm hover:bg-gray-50 transition flex items-center gap-3">
                        <span class="material-symbols-outlined text-green-500">waving_hand</span>
                        Boas-vindas
                    </button>
                    <button type="button" onclick="loadTemplate('newsletter')"
                        class="w-full text-left px-4 py-3 border border-gray-200 rounded-lg text-sm hover:bg-gray-50 transition flex items-center gap-3">
                        <span class="material-symbols-outlined text-blue-500">newspaper</span>
                        Newsletter
                    </button>
                    <button type="button" onclick="loadTemplate('lembrete')"
                        class="w-full text-left px-4 py-3 border border-gray-200 rounded-lg text-sm hover:bg-gray-50 transition flex items-center gap-3">
                        <span class="material-symbols-outlined text-purple-500">notifications</span>
                        Lembrete
                    </button>
                </div>
            </div>
        </div>

    </div>
</form>

        panels: {
            tools: { dock: 'left' }
        }
    }
});

// Carrega template
function loadTemplate(name) {
    if (templates[name]) {
        unlayer.loadDesign(templates[name]);
    }
}

// Exporta HTML e submete o form
function submitForm(action) {
    unlayer.exportHtml(function(data) {
        document.getElementById('body').value = data.html;

        const form = document.getElementById('campaignForm');
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'action';
        input.value = action;
        form.appendChild(input);
        form.submit();
    });
}

document.getElementById('saveDraftBtn').addEventListener('click', () => submitForm('draft'));
