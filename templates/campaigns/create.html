{% extends 'base.html' %}

{% block title %}Nova Campanha — ThunderMail{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <h1 class="text-lg font-bold text-gray-900">ThunderMail</h1>
        <div class="flex items-center gap-4">
            <a href="{% url 'campaigns:list' %}" class="text-sm text-gray-500 hover:underline">Campanhas</a>
            <a href="{% url 'accounts:logout' %}" class="text-sm text-red-500 hover:underline">Sair</a>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Nova Campanha</h2>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome da Campanha</label>
                    <input type="text" name="name" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black"
                        placeholder="Ex: Promoção de Natal">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Assunto do E-mail</label>
                    <input type="text" name="subject" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black"
                        placeholder="Ex: 🎄 Ofertas especiais de Natal!">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Grupo de Contatos</label>
                    <select name="group"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
                        <option value="">Selecione um grupo</option>
                        {% for group in groups %}
                        <option value="{{ group.pk }}">{{ group.name }} ({{ group.total_contacts }} contatos)</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Corpo do E-mail</label>
                    <textarea name="body" rows="10" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black"
                        placeholder="Escreva o conteúdo do seu e-mail aqui..."></textarea>
                </div>

                <div class="flex gap-3">
                    <button type="submit" name="action" value="draft"
                        class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition">
                        Salvar Rascunho
                    </button>
                    <button type="submit" name="action" value="send"
                        class="flex-1 bg-black text-white py-2 rounded-lg text-sm font-medium hover:bg-gray-800 transition">
                        Enviar Agora
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
