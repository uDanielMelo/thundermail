{% extends 'base.html' %}

{% block title %}Dashboard — ThunderMail{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <h1 class="text-lg font-bold text-gray-900">ThunderMail</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm text-gray-500">{{ request.user.email }}</span>
            <a href="{% url 'accounts:logout' %}"
                class="text-sm text-red-500 hover:underline">Sair</a>
        </div>
    </nav>

    <!-- Conteúdo -->
    <div class="max-w-6xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Dashboard</h2>

        <!-- Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                <p class="text-sm text-gray-500">Total de Campanhas</p>
                <p class="text-3xl font-bold text-gray-900 mt-1">0</p>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                <p class="text-sm text-gray-500">Total de Contatos</p>
                <p class="text-3xl font-bold text-gray-900 mt-1">0</p>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                <p class="text-sm text-gray-500">E-mails Enviados</p>
                <p class="text-3xl font-bold text-gray-900 mt-1">0</p>
            </div>
        </div>

        <!-- Ações Rápidas -->
        <div class="mt-8">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Ações Rápidas</h3>
            <div class="flex gap-4">
                <a href="{% url 'contacts:list' %}"
                    class="bg-black text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-gray-800 transition">
                    Gerenciar Contatos
                </a>
            </div>
        </div>

    </div>

</div>
{% endblock %}
