{% extends 'base.html' %}
{% block title %}Upload de Arquivo — ThunderMail{% endblock %}
{% block content %}

<header class="mb-6">
    <a href="{% url 'documents:home' %}" class="text-sm text-gray-400 hover:text-gray-600 flex items-center gap-1 mb-2">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Voltar
    </a>
    <h2 class="text-2xl font-bold text-gray-900">Upload de Arquivo</h2>
</header>

<div class="max-w-2xl">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
                <input type="text" name="title" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                    placeholder="Nome do documento">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Arquivo</label>
                <input type="file" name="file" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                <textarea name="description" rows="2"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                    placeholder="Descrição opcional..."></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Pasta</label>
                <select name="folder_id"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                    <option value="">Sem pasta</option>
                    {% for folder in folders %}
                    <option value="{{ folder.pk }}">{{ folder.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Tags</label>
                <div class="flex flex-wrap gap-2">
                    {% for tag in tags %}
                    <label class="cursor-pointer">
                        <input type="checkbox" name="tags" value="{{ tag.pk }}" class="hidden peer">
                        <span class="px-3 py-1 rounded-full text-xs font-medium border-2 border-transparent peer-checked:border-gray-400 transition
                            {% if tag.color == 'gray' %}bg-gray-100 text-gray-700
                            {% elif tag.color == 'red' %}bg-red-100 text-red-700
                            {% elif tag.color == 'orange' %}bg-orange-100 text-orange-700
                            {% elif tag.color == 'yellow' %}bg-yellow-100 text-yellow-700
                            {% elif tag.color == 'green' %}bg-green-100 text-green-700
                            {% elif tag.color == 'blue' %}bg-blue-100 text-blue-700
                            {% elif tag.color == 'purple' %}bg-purple-100 text-purple-700
                            {% elif tag.color == 'pink' %}bg-pink-100 text-pink-700
                            {% endif %}">
                            {{ tag.name }}
                        </span>
                    </label>
                    {% empty %}
                    <p class="text-xs text-gray-400">Nenhuma tag criada ainda.</p>
                    {% endfor %}
                </div>
            </div>
            <button type="submit"
                class="w-full bg-gray-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition">
                Fazer Upload
            </button>
        </form>
    </div>
</div>

{% endblock %}
