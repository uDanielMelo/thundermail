{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ThunderMail{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <img src="/static/logo.png" alt="ThunderMail" class="w-20 h-20 mx-auto mb-3">
            <h1 class="text-2xl font-bold text-gray-900">ThunderMail</h1>
            <p class="text-sm text-gray-500">Comunicacao que impacta</p>
        </div>

        {% if messages %}
        <div class="mb-4 space-y-2">
            {% for message in messages %}
            <div class="flex items-center gap-2 px-4 py-3 rounded-lg text-sm font-medium
                {% if message.tags == 'error' %}bg-red-100 text-red-700
                {% else %}bg-green-100 text-green-700{% endif %}">
                {% if message.tags == 'error' %}⚠{% else %}✔{% endif %}
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}

    </div>

</body>
</html>
